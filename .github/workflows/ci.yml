name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check src api tests retrain monitoring
      - name: Unit & API tests
        run: pytest tests/ -v

  train-smoke:
    name: Training smoke test
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: avalon
          POSTGRES_PASSWORD: avalon_dev_password
          POSTGRES_DB: avalon
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U avalon" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Seed a miniature warehouse
        run: python tests/seed_ci_warehouse.py
        env:
          AVALON_DSN: postgresql://avalon:avalon_dev_password@localhost:5432/avalon
      - name: Train end-to-end
        run: python -m avalon_reco.train --models-dir models --test-year 2025
        working-directory: .
        env:
          PYTHONPATH: src
          AVALON_DSN: postgresql://avalon:avalon_dev_password@localhost:5432/avalon
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/

  build-image:
    name: Build & push serving image
    runs-on: ubuntu-latest
    needs: train-smoke
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: model
          path: models/
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # deploy job intentionally stops at the image: the self-hosted cluster pulls
  # k8s/deployment.yaml; in a cloud setup this job would run kubectl apply.
