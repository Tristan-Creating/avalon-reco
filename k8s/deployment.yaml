apiVersion: apps/v1
kind: Deployment
metadata:
  name: reco-api
  namespace: avalon
  labels:
    app: reco-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reco-api
  strategy:
    rollingUpdate:
      maxUnavailable: 0   # never drop below capacity during a deploy
      maxSurge: 1
  template:
    metadata:
      labels:
        app: reco-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: reco-api
          image: ghcr.io/OWNER/avalon-reco:latest   # CI substitutes the tag
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/models/latest.joblib
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reco-api-secrets
                  key: admin-token
            - name: AVALON_DSN
              valueFrom:
                secretKeyRef:
                  name: reco-api-secrets
                  key: warehouse-dsn
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: reco-api
  namespace: avalon
spec:
  selector:
    app: reco-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reco-api
  namespace: avalon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reco-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
